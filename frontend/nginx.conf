# 1. Hazirliq App (Subdomain)
server {
    listen 80;
    server_name ~^hazirliq\..*$;
    client_max_body_size 50M;

    # Docker-in daxili DNS serverini (resolver) təyin edirik. 

    # Qayda: Hər 10 saniyədən bir İP ünvanları yenidən yoxlanılır.
    resolver 127.0.0.11 valid=10s;

    location / {
        # Hədəfi dəyişənə (variable) yazırıq ki, Nginx İP-ni keşləməsin və hər dəfə DNS-i yoxlasın
        set $upstream_hazirliq http://hazirliq_frontend:80;
        proxy_pass $upstream_hazirliq;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# 2. Salon App (Default - İP ilə gələndə)
server {
    listen 80 default_server;
    server_name _;
    client_max_body_size 50M;


    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    location /api/v1/ {
        proxy_pass http://backend:8000/api/v1/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /static/ {
        proxy_pass http://backend:8000/static/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

