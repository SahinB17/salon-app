name: Deploy to Oracle Cloud

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.ORACLE_HOST }}
          username: ${{ secrets.ORACLE_USERNAME }}
          key: ${{ secrets.ORACLE_SSH_KEY }}
          script: |
            # Serverdeki qovluğa keçid edirik (bu yolu öz serverinizdəki yerə görə dəyişə bilərsiniz)
            cd ~/salon-app
            
            # Ən son dəyişiklikləri GitHub-dan çəkirik (lokal dəyişiklikləri təmizləməklə)
            git reset --hard
            git pull origin main
            
            # Yalnız backend və frontend-i yenidən build edib başladırıq (DB-yə toxunmuruq)
            docker compose build salon_backend frontend
            docker compose up -d --no-deps salon_backend frontend
            
            # Verilənlər bazası miqrasiyalarını avtomatik işə salırıq
            docker compose exec -T salon_backend alembic upgrade head
            
            # Təmizlik (İstifadə olunmayan köhnə image-ləri silirik)
            docker image prune -f

